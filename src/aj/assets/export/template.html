<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
{{CSS}}
  </style>
</head>
<body>
  <input type="checkbox" id="theme-toggle">
  <label for="theme-toggle" class="theme-toggle" title="Toggle light / dark" aria-label="Toggle light or dark theme">&#9680;</label>
  <button id="hamburger" title="Open sidebar" aria-label="Open sidebar">&#9776;</button>
  <div id="sidebar-overlay"></div>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-controls">
          <input type="text" class="sidebar-search" id="tree-search" placeholder="Search...">
        </div>
        <div class="sidebar-filters">
          <button class="filter-btn active" data-filter="default" title="Hide settings entries">Default</button>
          <button class="filter-btn" data-filter="no-tools" title="Default minus tool results">No-tools</button>
          <button class="filter-btn" data-filter="user-only" title="Only user messages">User</button>
          <button class="filter-btn" data-filter="all" title="Show everything">All</button>
          <button class="toggle-btn" id="toggle-subagents" title="Show or hide sub-agent threads">Sub-agents</button>
          <button class="sidebar-close" id="sidebar-close" title="Close" aria-label="Close sidebar">&#10005;</button>
        </div>
      </div>
      <div class="tree-container" id="tree-container"></div>
      <div class="tree-status" id="tree-status"></div>
    </aside>
    <div id="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar"></div>
    <main id="content">
      <div id="header-container"></div>
      <div id="messages"></div>
    </main>
    <div id="image-modal" class="image-modal"><img id="modal-image" src="" alt=""></div>
  </div>

  <!-- The complete session, embedded losslessly as gzip-compressed,
       base64-encoded JSON. The base64 alphabet has no `<`, so the payload
       cannot break out of this script element. The renderer inflates it
       with the browser's DecompressionStream, then JSON.parse. -->
  <script type="application/octet-stream" id="session-data">{{SESSION_DATA}}</script>

  <!-- Vendored library, inlined for offline use. Full license text:
{{LICENSES}}
  -->
  <script>{{MARKED_JS}}</script>

  <!-- Renderer. -->
  <script>
{{APP_JS}}
  </script>
</body>
</html>
